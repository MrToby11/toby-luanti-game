# Player movement physics
# These are the base values - set_physics_override in Lua uses these as its "1.0"

movement_speed_walk           = 4.3   # slightly faster than default 4
movement_speed_crouch         = 1.3   # sneak speed
movement_speed_jump           = 7     # default, jump height tuned via override instead
movement_gravity              = 12    # heavier than default 9.81, reduces floatiness
movement_acceleration_default = 10    # ground acceleration, default
movement_acceleration_air     = 5     # air acceleration - lower than ground for momentum